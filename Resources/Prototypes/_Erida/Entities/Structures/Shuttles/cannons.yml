- type: entity
  id: ShuttleGunNavyTurbolaserBlue
  suffix: Blue
  parent: [ ShuttleGunBase, ConstructibleMachine]
  name: turbolaser
  description:
  components:
  - type: Sprite
    sprite: _Erida/Objects/Weapons/Guns/Shuttles/turbolaser.rsi
    layers:
    - state: aut-500s
    - state: mag-unshaded-7
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: ContainerContainer
    containers:
      machine_board: !type:Container
      machine_parts: !type:Container
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 150
      behaviors:
        - !type:ChangeConstructionNodeBehavior
          node: machineFrame
        - !type:DoActsBehavior
          acts: ["Destruction"]
  - type: Gun
    fireRate: 5
    useKey: false
    soundGunshot:
      path: /Audio/_Erida/Weapons/Guns/Gunshots/turbolaser1.ogg
      params:
        variation: 0.05
  - type: MagazineVisuals
    magState: mag
    steps: 8
    zeroVisible: true
  - type: Machine
    board: ShuttleGunNavyTurbolaserBlueMachineGunCircuitboard
  - type: BatteryAmmoProvider
    proto: TurboLaserBlue
    fireCost: 100
  - type: Battery
    maxCharge: 1000
    startingCharge: 1000
  - type: BatterySelfRecharger
    autoRechargePauseTime: 1
    autoRechargeRate: 525
    
- type: entity
  id: ShuttleGunNavyTurbolaserRed
  suffix: Red
  parent: ShuttleGunNavyTurbolaserBlue
  name: turbolaser
  description:
  components:
  - type: Gun
    fireRate: 5
    useKey: false
    soundGunshot:
      path: /Audio/_Erida/Weapons/Guns/Gunshots/turbolaser2.ogg
      params:
        variation: 0.05
  - type: BatteryAmmoProvider
    proto: TurboLaserRed
  - type: Machine
    board: ShuttleGunNavyTurbolaserRedMachineGunCircuitboard

- type: entity
  id: LockerNTNavy
  parent: LockerBaseSecure
  name: nanotrasen navy locker
  components:
  - type: Sprite
    sprite: _Erida/Structures/Storage/closet.rsi
    noRot: true
    layers:
    - state: generic
      map: ["enum.StorageVisualLayers.Base"]
    - state: generic_door
      map: ["enum.StorageVisualLayers.Door"]
    - state: locked
      map: ["enum.LockVisualLayers.Lock"]
      shader: unshaded
    - state: welded
      visible: false
      map: ["enum.WeldableLayers.BaseWelded"]
    - state: paper
      visible: false
      sprite: Structures/Storage/closet_labels.rsi
      offset: "-0.065,0"
      map: ["enum.PaperLabelVisuals.Layer"]
  - type: Appearance
  - type: EntityStorageVisuals
    stateBaseClosed: nanotrasen_navy_closet
    stateDoorOpen: nanotrasen_navy_closet_open
    stateDoorClosed: nanotrasen_navy_closet_door
  - type: AccessReader
    access: [["CentralCommand"], ["NTNavy"]]


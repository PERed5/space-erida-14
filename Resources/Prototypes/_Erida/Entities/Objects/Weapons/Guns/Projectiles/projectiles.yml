- type: entity
  id: TurboLaserRed
  suffix: Red
  name: turbolaser
  parent: [BaseBulletTrigger, BulletLaser]
  categories: [ HideSpawnMenu ]
  components:
  - type: Reflective
    reflective:
    - Energy
  - type: FlyBySound
    sound:
      collection: EnergyMiss
      params:
        volume: 5
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles_tg.rsi
    scale: 1, 1
    layers:
    - state: heavylaser
      shader: unshaded
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    totalIntensity: 75
    intensitySlope: 5
    maxIntensity: 10
  - type: Ammo
    muzzleFlash: MuzzleFlashEffectRedLaser
  - type: Projectile
    impactEffect: BulletImpactEffectOrangeDisabler
    damage:
      types:
        Heat: 200
        Structural: 50
  - type: PointLight
    radius: 3.5
    color: red
    energy: 0.5
    
- type: entity
  id: TurboLaserBlue
  suffix: Blue
  name: turbolaser
  parent: TurboLaserRed
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Erida/Objects/Weapons/Guns/Projectiles/projectiles.rsi

- type: entity
  parent: MuzzleFlashEffect
  id: MuzzleFlashEffectBlueLaser
  categories: [ HideSpawnMenu ]
  components:
  - type: PointLight
    enabled: true
    color: "#0000CD" # imp
    radius: 1.4 # imp
    energy: 5.0 # imp
  - type: Sprite
    drawdepth: BelowMobs
    offset: 0.75, 0
    layers:
    - shader: unshaded
      map: ["enum.EffectLayers.Unshaded"]
      sprite: _Impstation/Objects/Weapons/Guns/Projectiles/muzzleflashes.rsi # imp
      state: tempcold # imp

- type: entity
  parent: MuzzleFlashEffect
  id: MuzzleFlashEffectRedLaser
  categories: [ HideSpawnMenu ]
  components:
  - type: PointLight
    enabled: true
    color: "#FF0000" # imp
    radius: 1.4 # imp
    energy: 5.0 # imp
  - type: Sprite
    drawdepth: BelowMobs
    offset: 0.75, 0
    layers:
    - shader: unshaded
      map: ["enum.EffectLayers.Unshaded"]
      sprite: _Impstation/Objects/Weapons/Guns/Projectiles/muzzleflashes.rsi # imp
      state: energy # imp

- type: entity
  name: laser bullet
  id: BulletEnergyBLUE
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Reflective
    reflective:
    - Energy
  - type: FlyBySound
    sound:
      collection: EnergyMiss
      params:
        volume: 5
  - type: Sprite
    sprite: _Erida/Objects/Weapons/Guns/Projectiles/projectiles.rsi
    layers:
    - state: bluelaser-alt
      shader: unshaded
  - type: Projectile
    impactEffect: BulletImpactEffectBlueDisabler
    damage:
      types:
        Heat: 25
    soundHit:
      collection: MeatLaserImpact
  - type: PointLight
    radius: 2
    color: blue
    energy: 0.5
  - type: Ammo
    muzzleFlash: MuzzleFlashEffectTempCold # imp

